kind = "mobile"
previewPath = "/mobile/"
title = "Rooted Insight Mobile"
version = "1.0.0"
id = "artifacts/rooted-insight-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22633

[services.development]
run = "pnpm --filter @workspace/rooted-insight-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rooted-insight-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/rooted-insight-mobile", "run", "serve" ]

[services.env]
PORT = "22633"
BASE_PATH = "/mobile/"
