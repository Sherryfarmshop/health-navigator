kind = "web"
previewPath = "/"
title = "Rooted Insight"
version = "1.0.0"
id = "artifacts/rooted-insight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19856

[services.development]
run = "pnpm --filter @workspace/rooted-insight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rooted-insight", "run", "build" ]
publicDir = "artifacts/rooted-insight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19856"
BASE_PATH = "/"
